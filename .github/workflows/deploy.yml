name: Deploy Angular to GitHub Pages

on:
  push:
    tags:
      - 'version-*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Generate production environment file
        run: |
          mkdir -p src/environments
          cat > src/environments/environment.prod.ts << EOF
          export const environment = {
            production: true,
            contactPhone: '${NG_APP_CONTACT_PHONE:-8248395391}',
            waNumber: '${NG_APP_WA_NUMBER:-918248395391}',
            instagram: '${NG_APP_INSTAGRAM_PAGE:-https://instagram.com/chennaicremation}',
          };
          EOF
        env:
          NG_APP_CONTACT_PHONE: ${{ vars.CONTACT_PHONE }}
          NG_APP_WA_NUMBER: ${{ vars.WA_NUMBER }}
          NG_APP_INSTAGRAM_PAGE: ${{ vars.INSTAGRAM_PAGE }}
      - name: Show injected production config
        run: |
          echo "::group::Injected environment.prod.ts"
          cat src/environments/environment.prod.ts
          echo "::endgroup::"
      - name: Build
        run: npm run build -- --base-href "/Chennai-Cremation/" --configuration production
      - name: Verify contact number is baked into the bundle
        run: |
          PHONE="${NG_APP_CONTACT_PHONE:-8248395391}"
          if grep -q "$PHONE" dist/chennai-final-journey/browser/main-*.js; then
            echo "Deployed bundle contains contact number: $PHONE"
          else
            echo "Contact number $PHONE NOT found in built bundle" >&2
            exit 1
          fi
        env:
          NG_APP_CONTACT_PHONE: ${{ vars.CONTACT_PHONE }}
      - name: Copy index.html to 404.html (SPA routing)
        run: |
          for d in dist/*/browser; do cp "$d/index.html" "$d/404.html"; done
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/chennai-final-journey/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
